name: Linux CI/CD

on:
  push:
    branches:
      - master
    paths:
      - ".github/workflows/linux_build.yml"
      - ".github/workflows/windows_build.yml"
      - "Cargo.toml"
      - "Cargo.lock"
      - "assets/**"
      - "cli/**"
      - "docs/**"
      - "goida-*/**"
      - "lsp/**"
      - "tests/**"
      - "xtask/**"
      - "examples/**"
      - "editors/vscode/**"
  pull_request:
    branches:
      - master
    paths:
      - ".github/workflows/linux_build.yml"
      - ".github/workflows/windows_build.yml"
      - "Cargo.toml"
      - "Cargo.lock"
      - "assets/**"
      - "cli/**"
      - "docs/**"
      - "goida-*/**"
      - "lsp/**"
      - "tests/**"
      - "xtask/**"
      - "examples/**"
      - "editors/vscode/**"
  workflow_dispatch:

env:
  CARGO_TERM_COLOR: always

jobs:
  build-linux:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy

      - name: Cache cargo dependencies
        uses: Swatinem/rust-cache@v2

      - name: Check formatting
        run: cargo fmt --all --check

      - name: Run clippy
        run: cargo clippy --workspace --all-targets -- -D warnings

      - name: Check generated built-in documentation
        run: cargo run -p xtask -- builtin-docs --check

      - name: Build native FFI test library
        run: cargo build -p native_ffi_test_lib

      - name: Run tests
        run: cargo test --workspace --all-targets

      - name: Build release binaries
        run: cargo build --release -p goida-cli -p goida-lsp

      - name: Upload CLI artifact
        uses: actions/upload-artifact@v4
        with:
          name: linux-goida
          path: target/release/goida

      - name: Upload LSP artifact
        uses: actions/upload-artifact@v4
        with:
          name: linux-lsp
          path: target/release/goida-lsp
